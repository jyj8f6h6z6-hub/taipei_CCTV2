<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>台北市即時 CCTV 地圖</title>

  <meta
    name="description"
    content="整合台北市道路 CCTV 與水情 CCTV 的即時影像地圖。"
  >

  <!-- Leaflet 地圖樣式 -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >

  <!-- 網站樣式 -->
  <link rel="stylesheet" href="style.css?v=3">

  <!-- 避免 favicon 404 -->
  <link rel="icon" href="data:,">
</head>

<body>

  <header>
    <div class="header-row">
      <h1>🗺 台北市即時 CCTV</h1>

      <div class="controls">

        <input
          id="q"
          type="search"
          placeholder="搜尋路名、站名、行政區…"
          aria-label="搜尋 CCTV"
        >

        <select
          id="sourceFilter"
          aria-label="選擇 CCTV 類型"
        >
          <option value="all">全部 CCTV</option>
          <option value="road">道路 CCTV</option>
          <option value="water">水情 CCTV</option>
          <option value="water-rental">水情租賃 CCTV</option>
        </select>

        <select
          id="districtFilter"
          aria-label="選擇行政區"
        >
          <option value="全部">全部行政區</option>
        </select>

        <button
          id="locationBtn"
          type="button"
        >
          📍 我的位置
        </button>

      </div>
    </div>

    <div
      class="status-bar"
      id="status"
      aria-live="polite"
    >
      載入中……
    </div>
  </header>

  <main class="body">

    <aside
      class="sidebar"
      id="sidebar"
      aria-label="CCTV 清單"
    ></aside>

    <div
      id="map"
      aria-label="台北市即時 CCTV 地圖"
    ></div>

  </main>

  <!-- 先載入 Leaflet -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <!-- 再載入網站程式 -->
  <script src="script.js?v=3"></script>

</body>
</html>
