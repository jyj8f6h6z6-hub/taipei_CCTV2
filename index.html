<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <title>即時 CCTV 地圖</title>

  <meta
    name="description"
    content="整合各縣市道路 CCTV、水情 CCTV 與水情租賃 CCTV 的即時影像地圖。"
  >

  <!-- Leaflet 地圖樣式 -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >

  <!-- 網站樣式 -->
  <link rel="stylesheet" href="style.css?v=4">

  <!-- 避免 favicon 404 -->
  <link rel="icon" href="data:,">
</head>

<body>

  <header>
    <div class="header-row">

      <h1>🗺 即時 CCTV 地圖</h1>

      <div class="controls">

        <!-- 搜尋 -->
        <div
          id="placeAutocomplete"
          aria-label="搜尋地址、車站、地標或店家"
        ></div>

        <!-- 縣市 -->
        <select
          id="cityFilter"
          aria-label="選擇縣市"
        >
          <option value="全部">全部縣市</option>
        </select>

        <!-- 行政區 -->
        <select
          id="districtFilter"
          aria-label="選擇行政區"
        >
          <option value="全部">全部行政區</option>
        </select>

        <!-- CCTV 類型 -->
        <select
          id="sourceFilter"
          aria-label="選擇 CCTV 類型"
        >
          <option value="all">全部 CCTV</option>
          <option value="road">道路 CCTV</option>
          <option value="water">水情 CCTV</option>
          <option value="water-rental">水情租賃 CCTV</option>
        </select>

        <button
          id="clearSearchBtn"
          type="button"
          hidden
        >
          ✕ 清除搜尋
        </button>

        <!-- 定位 -->
        <button
          id="locationBtn"
          type="button"
        >
          📍 我的位置
        </button>

      </div>
    </div>

    <div
      class="status-bar"
      id="status"
      aria-live="polite"
    >
      載入中……
    </div>
  </header>

  <main class="body">

    <aside
      class="sidebar"
      id="sidebar"
      aria-label="CCTV 清單"
    ></aside>

    <div
      id="map"
      aria-label="即時 CCTV 地圖"
    ></div>

  </main>

  <!-- 先載入 Leaflet -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <!-- HLS 串流播放 -->
  <script
    src="https://cdn.jsdelivr.net/npm/hls.js@latest"
  ></script>

  <!-- Google Maps 地點搜尋 -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDHJ18rC0CuG4OGUbF-c4H7xavGoKOrTgw&libraries=places&language=zh-TW&region=TW"
  ></script>

  <!-- 再載入網站程式 -->
  <script src="script.js?v=4"></script>

</body>
</html>
