name: 更新宜蘭道路 CCTV

on:
  schedule:
    # UTC 19:10，臺灣時間每日凌晨 03:10
    - cron: "10 19 * * *"

  # 允許從 GitHub Actions 頁面手動執行
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-yilan-road-cctv
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 下載專案
        uses: actions/checkout@v4

      - name: 下載 twipcam CCTV 公開資料
        run: |
          curl -L \
            --fail \
            --retry 3 \
            --retry-delay 5 \
            --connect-timeout 20 \
            --max-time 180 \
            "https://www.twipcam.com/api/v1/cam-list.json" \
            -o twipcam-cam-list.json

      - name: 下載宜蘭警察局 CCTV 公開清單
        run: |
          curl -L \
            --fail \
            --retry 2 \
            --retry-all-errors \
            --retry-delay 5 \
            --connect-timeout 15 \
            --max-time 45 \
            --http1.1 \
            --tlsv1.2 \
            --tls-max 1.2 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            "https://ilcpb.ivs.hinet.net/public/ilcpb_live_cam" \
            -o yilan-official-cams.html

          test -s yilan-official-cams.html

      - name: 產生宜蘭官方攝影機對照資料
        run: |
          perl -0777 -MJSON::PP -MEncode=decode -e '
            use strict;
            use warnings;

            my $html = decode(
               "UTF-8",
               <>
            );
            my $category = "";
            my @results;

            while (
              $html =~
              m{<tr\b[^>]*>(.*?)</tr>}gsi
            ) {
              my $row = $1;
              my @cells;

              while (
                $row =~
                m{<td\b([^>]*)>(.*?)</td>}gsi
              ) {
                my $attrs = $1;
                my $text = $2;

                $text =~ s/<[^>]+>//g;
                $text =~ s/&nbsp;/ /g;
                $text =~ s/&amp;/&/g;
                $text =~ s/^\s+|\s+$//g;

                push @cells, {
                  attrs => $attrs,
                  text => $text
                };
              }

              next unless
                $row =~
                m{hls_player\?page=ilcpb&did=(\d+)};

              my $did = $1;

              if (
                @cells &&
                $cells[0]{attrs} =~ /rowspan/i
              ) {
                $category =
                  $cells[0]{text};

                shift @cells;
              }

              next unless @cells >= 2;

              my $location =
                $cells[0]{text};

              my $description =
                $cells[1]{text};

              my $clean_description =
                $description;

              $clean_description =~
                s/^\([^)]*\)//;

              $clean_description =~
                s/^\s+|\s+$//g;

              push @results, {
                category =>
                  $category,

                location =>
                  $location,

                description =>
                  $description,

                cleanName =>
                  $category .
                  " " .
                  $clean_description,

                did =>
                  $did,

                playerUrl =>
                  "https://ilcpb.ivs.hinet.net/public/hls_player?page=ilcpb&did=" .
                  $did
              };
            }

            print JSON::PP
              ->new
              ->utf8
              ->pretty
              ->canonical
              ->encode(\@results);
          ' yilan-official-cams.html \
            > yilan-official-cams.json

          echo "官方攝影機數量："
          jq 'length' \
            yilan-official-cams.json

          echo "前 3 筆官方對照資料："
          jq '.[0:3]' \
            yilan-official-cams.json

      - name: 比較宜蘭攝影機名稱差異
        run: |
          jq -n \
            --slurpfile twipcam twipcam-cam-list.json \
            --slurpfile official yilan-official-cams.json \
            '
            def normalize:
              tostring
              | gsub("^宜蘭縣道路\\s*"; "")
              | gsub("^\\([^)]*\\)"; "")
              | gsub("[[:space:]]+"; "")
              | gsub("[、，,。．・／/]"; "")
              | gsub("臺"; "台")
              | gsub("線路口"; "線口")
              | gsub("交岔路口"; "路口")
              | gsub("交叉路口"; "路口");

            [
              $twipcam[0][]
              | select(
                  (.name // "") |
                  startswith("宜蘭縣道路 ")
                )
              | . as $cam
              | (
                  $official[0]
                  | map(
                      select(
                        (.cleanName | normalize) ==
                        ($cam.name | normalize)
                      )
                    )
                  | first
                ) as $exact
              | select($exact == null)
              | {
                  twipcamId: $cam.id,
                  twipcamName:
                    ($cam.name |
                     sub("^宜蘭縣道路 "; "")),

                  possibleOfficialMatches: (
                    $official[0]
                    | map(
                        select(
                          (
                            (.description | normalize)
                            | contains(
                                (
                                  $cam.name
                                  | normalize
                                  | .[0:12]
                                )
                              )
                          )
                          or
                          (
                            ($cam.name | normalize)
                            | contains(
                                (
                                  .description
                                  | normalize
                                  | .[0:12]
                                )
                              )
                          )
                        )
                      )
                    | map({
                        did,
                        cleanName,
                        location
                      })
                    | .[0:5]
                  )
                }
            ]
          ' > yilan-name-differences.json

          echo "未精確配對數量："
          jq 'length' yilan-name-differences.json

          echo "前 10 筆名稱差異："
          jq '.[0:10]' yilan-name-differences.json

      - name: 驗證原始 JSON
        run: |
          jq empty twipcam-cam-list.json

          echo "全部攝影機數量："
          jq 'length' twipcam-cam-list.json

      - name: 查看第一筆宜蘭原始資料
        run: |
          echo "第一筆宜蘭道路 CCTV 原始資料："

          jq '
            [
              .[]
              | select(
                  (.name // "") |
                  startswith("宜蘭縣道路 ")
                )
            ][0]
          ' twipcam-cam-list.json

      - name: 產生宜蘭道路 CCTV JSON
        run: |
          jq \
            --slurpfile official yilan-official-cams.json \
            '
            def district_from_name:
              if test("宜蘭市") then "宜蘭市"
              elif test("羅東鎮") then "羅東鎮"
              elif test("蘇澳鎮") then "蘇澳鎮"
              elif test("頭城鎮") then "頭城鎮"
              elif test("礁溪鄉") then "礁溪鄉"
              elif test("壯圍鄉") then "壯圍鄉"
              elif test("員山鄉") then "員山鄉"
              elif test("冬山鄉") then "冬山鄉"
              elif test("五結鄉") then "五結鄉"
              elif test("三星鄉") then "三星鄉"
              elif test("大同鄉") then "大同鄉"
              elif test("南澳鄉") then "南澳鄉"
              else "未判定"
              end;

            def normalize_name:
              tostring
              | gsub("^宜蘭縣道路\\s*"; "")
              | gsub("[[:space:]]+"; "")
              | gsub("臺"; "台");

            {
              results: [
                .[]
                | select(
                    (.name // "") |
                    startswith("宜蘭縣道路 ")
                  )
                | select(
                    .id != null and
                    .lat != null and
                    .lon != null and
                    .cam_url != null
                  )

                | . as $camera

                | (
                    $official[0]
                    | map(
                        select(
                          (.cleanName | normalize_name) ==
                          ($camera.name | normalize_name)
                        )
                      )
                    | first
                  ) as $match

                | {
                    key: (
                      "yilan-road-" +
                      ($camera.id | tostring)
                    ),

                    id: (
                      $camera.id | tostring
                    ),

                    officialId: (
                      if $match then
                        ($match.did | tostring)
                      else
                        ""
                      end
                    ),

                    name: (
                      ($camera.name | tostring)
                      | sub("^宜蘭縣道路 "; "")
                    ),

                    x: (
                      $camera.lon | tonumber
                    ),

                    y: (
                      $camera.lat | tonumber
                    ),

                    city: "宜蘭縣",

                    district: (
                      ($camera.name | tostring)
                      | district_from_name
                    ),

                    imageUrl: (
                      $camera.cam_url | tostring
                    ),

                    url: (
                      if $match then
                        ($match.playerUrl | tostring)
                      else
                        ($camera.cam_url | tostring)
                      end
                    ),

                    streamUrl: (
                      if $match then
                        ($match.playerUrl | tostring)
                      else
                        ""
                      end
                    ),

                    type: "road",

                    source:
                      "宜蘭縣政府警察局公開即時路況；座標與預覽圖由 twipcam 提供"
                  }
              ]
            }
          ' twipcam-cam-list.json \
            > yilan-road-cctv.json.tmp

          mv \
            yilan-road-cctv.json.tmp \
            yilan-road-cctv.json

      - name: 驗證宜蘭 JSON
        run: |
          jq empty yilan-road-cctv.json

          count="$(
            jq '.results | length' \
              yilan-road-cctv.json
          )"

          echo "宜蘭道路 CCTV 數量：${count}"

          if [ "$count" -eq 0 ]; then
            echo "錯誤：沒有取得宜蘭道路 CCTV"
            exit 1
          fi
          matched="$(
            jq '
              [
                .results[]
                | select(
                    (.officialId // "") != ""
                  )
              ]
              | length
            ' yilan-road-cctv.json
          )"

          unmatched="$(
            jq '
              [
                .results[]
                | select(
                    (.officialId // "") == ""
                  )
              ]
              | length
            ' yilan-road-cctv.json
          )"

          echo "成功配對官方播放器：${matched}"
          echo "尚未配對官方播放器：${unmatched}"

          echo "尚未配對的前 10 筆："

          jq '
            [
              .results[]
              | select(
                  (.officialId // "") == ""
                )
              | {
                  id,
                  name,
                  district
                }
            ]
          ' yilan-road-cctv.json
          
          echo "前 3 筆資料："

          jq '.results[0:3]' \
            yilan-road-cctv.json

      - name: 刪除暫存檔案
        run: |
          rm -f twipcam-cam-list.json
          rm -f yilan-official-cams.html
          rm -f yilan-official-cams.json
          rm -f yilan-official-lines.html
          rm -f yilan-name-differences.json

      - name: 提交更新
        run: |
          git config \
            user.name \
            "github-actions[bot]"

          git config \
            user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add yilan-road-cctv.json

          if git diff --cached --quiet; then
            echo "宜蘭道路 CCTV 資料沒有變更"
            exit 0
          fi

          git commit \
            -m "chore: 自動更新宜蘭道路 CCTV 資料"

          git push